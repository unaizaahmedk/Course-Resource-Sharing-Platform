{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/login_styles.css' %}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>COURSE RESOURCE</h1>
                <h2>SHARING PLATFORM</h2>
            </div>

            <ul class="nav-links">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'browse_courses' %}">Browse Courses</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-section">
            {% if messages %}
            <div class="messages">
                <ul>
                    {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}

            <section>
                <img src="{% static 'images/blue.jpg' %}" alt="Background" class="hero-bg">
                <div class="form-container">
                    <h2 style="color: #007BFF;">Welcome Back!</h2>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>

                        <button type="submit" class="submit-btn">Login</button>
                        <input type="hidden" name="next" value="{{ next }}" />
                    </form>
                    <p style="margin-top: 15px; font-size: 13px;">Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
