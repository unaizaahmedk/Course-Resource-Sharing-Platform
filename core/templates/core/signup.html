{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>COURSE RESOURCE</h1>
                <h2>SHARING PLATFORM</h2>
            </div>
            <ul class="nav-links">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'browse_courses' %}">Browse Courses</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
                <li><a href="{% url 'signup' %}">Sign Up</a></li>
            </ul>
        </nav>
    </header>
    <div class="form-section">
        {% if messages %}
        <div class="messages">
            <ul>
                {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <section>
            <img src="{% static 'images/blue.jpg' %}" alt="Background" class="hero-bg">
            <div class="form-container">
                <h2 style="color: #007BFF;">Sign Up</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-row">
                        <div class="left-column">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                        </div>

                        <div class="right-column">
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" required>
                            </div>

                            <div class="form-group">
                                <label for="confirm_password">Confirm Password</label>
                                <input type="password" id="confirm_password" name="confirm_password" required>
                            </div>
                        </div>
                    </div>

                    <div class="button-container">
                        <button type="submit" class="submit-btn">Create Account</button>
                    </div>
                </form>
                <p style="margin-top: 15px; font-size: 13px;">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
            </div>
        </section>
    </div>
</body>
</html>
